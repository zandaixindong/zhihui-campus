server:
  port: 8083

spring:
  application:
    name: zhihui-student
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: zhihui-campus
      config:
        server-addr: 127.0.0.1:8848
        namespace: zhihui-campus
        file-extension: yml
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/zhihui_campus?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zhihui.student.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

token:
  secret: abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMN
  expireTime: 720
  header: Authorization

logging:
  level:
    com.zhihui.student: debug
