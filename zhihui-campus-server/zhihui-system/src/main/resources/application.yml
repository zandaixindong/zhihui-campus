server:
  port: 8082

spring:
  application:
    name: zhihui-system
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: zhihui-campus
      config:
        server-addr: 127.0.0.1:8848
        namespace: zhihui-campus
        file-extension: yml
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/zhihui_campus?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zhihui.system.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# Token配置
token:
  secret: abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMN
  expireTime: 720
  header: Authorization

logging:
  level:
    com.zhihui.system: debug
